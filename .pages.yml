media:
  input: public/media
  output: /media

components:
  seo:
    type: object
    label: SEO
    fields:
      - name: title
        type: string
      - name: description
        type: text

content:
  - name: portfolio
    label: Portfolio Data
    type: file
    path: public/portfolio.json
    format: json
    list: false
    fields:
      - name: projects
        label: Projects
        type: object
        list: true
        collapsible:
          collapsed: false
          summary: "{title}"
        fields:
          - name: icon
            label: Icon
            type: string
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: text
          - name: githubUrl
            label: GitHub URL
            type: string
          - name: tags
            label: Tags
            type: string
            list: true
          - name: date
            label: Date
            type: string